<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨色黄昏 - 网页解密游戏</title>
  <meta name="description" content="一款本格推理网页解密游戏。调查陈墨白的死亡真相，收集线索，推理破案。">

  <!-- Fonts (Google Fonts CDN) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/scenes.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">

  <style>
    /* 内联关键样式，防止 FOUC */
    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0a06;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <!-- ==========================================
       加载屏幕
       ========================================== -->
  <div id="loading-screen">
    <h1 class="intro-title" style="font-size:64px;color:#c9a96e;letter-spacing:12px;font-family:serif;margin-bottom:24px;">
      墨色黄昏
    </h1>
    <div class="loading-bar" style="width:200px;height:2px;background:#2c1f12;border-radius:9999px;overflow:hidden;margin-bottom:16px;">
      <div class="loading-bar-fill" style="width:0%;height:100%;background:#c9a96e;transition:width 0.3s ease;"></div>
    </div>
    <p style="font-size:14px;color:#6b5c47;letter-spacing:4px;font-family:sans-serif;">加载中...</p>
  </div>

  <!-- ==========================================
       游戏容器
       ========================================== -->
  <div id="game-container" style="display:none;">
    <!-- 场景渲染区 -->
    <div id="scene-container"></div>

    <footer id="site-footer">© 2026 Xiaolele_er</footer>

    <!-- UI层 -->
    <div id="ui-layer">
      <!-- 顶部信息栏 -->
      <div id="header">
        <div class="header-left">
        </div>
        <div class="header-right">
          <button id="map-btn" title="打开地图">🗺️ 地图</button>
        </div>
      </div>

      <!-- 笔记本按钮（右下角固定） -->
      <button id="notebook-btn" title="打开笔记本">📓</button>

      <!-- 设置按钮（左下角固定） -->
      <button id="settings-btn" title="设置">⚙️</button>

      <!-- 线索通知 -->
      <div id="clue-notification" class="hidden"></div>

      <!-- 对话框 -->
      <div id="dialogue-box" class="hidden"></div>

      <!-- 物品探索面板 -->
      <div id="item-panel" class="hidden"></div>

    </div>
  </div>

  <!-- 笔记本面板由 notebook.js 动态创建 -->

  <!-- ==========================================
       数据文件
       ========================================== -->
  <script src="data/clues.js"></script>
  <script src="data/scenes.js"></script>
  <script src="data/dialogues.js"></script>

  <!-- ==========================================
       JavaScript 模块
       ========================================== -->
  <script src="js/utils.js"></script>
  <script src="js/router.js"></script>
  <script src="js/state.js"></script>
  <script src="js/clue-system.js"></script>
  <script src="js/dialogue-system.js"></script>
  <script src="js/scene-manager.js"></script>
  <script src="js/notebook.js"></script>
  <script src="js/reasoning.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
